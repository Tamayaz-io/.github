  <g transform="translate(44, 184)">
    <rect width="320" height="44" rx="22" fill="#44D62C"/>
    <text x="160" y="29" text-anchor="middle" font-family="Montserrat, ui-sans-serif, Helvetica, Arial, sans-serif" font-weight="700" font-size="13" fill="#231F20" letter-spacing="1">CLAIM YOUR FREE ASSESSMENT  &#8594;</text>
  </g>
  <text x="384" y="213" font-family="Montserrat, ui-sans-serif, Helvetica, Arial, sans-serif" font-weight="400" font-size="14" fill="#C6C9C6">or write to <tspan font-weight="700" fill="#44D62C">success@tamayaz.io</tspan></text>
