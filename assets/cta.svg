<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240" role="img" aria-label="Work with Tamayaz. Claim your free assessment.">
  <title>Work with Tamayaz</title>
  <defs>
    <linearGradient id="cta-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2526"/>
      <stop offset="100%" stop-color="#161314"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="240" rx="18" fill="url(#cta-bg)"/>
  <rect x="0" y="0" width="6" height="240" fill="#44D62C"/>
  <g fill="#44D62C" opacity="0.10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">
    <text x="956" y="32">+</text><text x="976" y="32">+</text><text x="996" y="32">+</text><text x="1016" y="32">+</text><text x="1036" y="32">+</text>
    <text x="956" y="52">+</text><text x="976" y="52">+</text><text x="996" y="52">+</text><text x="1016" y="52">+</text><text x="1036" y="52">+</text>
    <text x="956" y="72">+</text><text x="976" y="72">+</text><text x="996" y="72">+</text><text x="1016" y="72">+</text><text x="1036" y="72">+</text>
  </g>

  <text x="44" y="62" font-family="Montserrat, ui-sans-serif, Helvetica, Arial, sans-serif" font-weight="700" font-size="11" letter-spacing="4" fill="#44D62C">GET STARTED</text>
  <text x="44" y="108" font-family="Montserrat, ui-sans-serif, Helvetica, Arial, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="-0.5">Work with Tamayaz</text>
  <g font-family="Montserrat, ui-sans-serif, Helvetica, Arial, sans-serif" font-weight="400" font-size="16" fill="#C6C9C6">
    <text x="44" y="142">If you're looking for help with a product build, an internal tool, or an</text>
